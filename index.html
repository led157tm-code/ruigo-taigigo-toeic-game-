.shake{animation:shake 0.2s;}

#jp{margin:10px;color:#333;font-weight:bold;}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  width:90%;
  max-width:420px;

}

.card{

  padding:12px;
  border-radius:10px;
  cursor:pointer;
}

.correct{background:#4CAF50;color:white;}
.wrong{background:#ff4d4d;color:white;}

{w:"conflict with", m:"対立する", s:["oppose"], a:["align with"]},
{w:"compromise", m:"妥協する", s:["concede"], a:["insist"]},
{w:"insist", m:"主張する", s:["assert"], a:["concede"]},
{w:"concede", m:"認める", s:["admit"], a:["deny"]},

{w:"elaborate", m:"詳しく述べる", s:["expand"], a:["summarize"]},
{w:"summarize", m:"要約する", s:["outline"], a:["elaborate"]},
{w:"outline", m:"概説する", s:["summarize"], a:["detail"]},
{w:"specify", m:"明示する", s:["clarify"], a:["vague"]},

{w:"vague", m:"曖昧な", s:["unclear"], a:["clear"]},
{w:"explicit", m:"明確な", s:["clear"], a:["implicit"]},
{w:"implicit", m:"暗黙の", s:["implied"], a:["explicit"]},
{w:"derive from", m:"由来する", s:["originate from"], a:["lead to"]},
{w:"lead to", m:"引き起こす", s:["result in"], a:["prevent"]},

{w:"trigger", m:"引き起こす", s:["cause"], a:["prevent"]},
{w:"prevent", m:"防ぐ", s:["avoid"], a:["cause"]},
{w:"justify", m:"正当化する", s:["defend"], a:["criticize"]},
{w:"praise", m:"称賛する", s:["commend"], a:["criticize"]}
];

// 🔥 重複単語を統合（削除せずマージ）
const mergedDataMap = {};

data.forEach(item => {
  if(!mergedDataMap[item.w]){
    mergedDataMap[item.w] = {
      w: item.w,
      m: item.m,
      s: [...(item.s || [])],
      a: [...(item.a || [])]
    };
  } else {
    mergedDataMap[item.w].s.push(...(item.s || []));
    mergedDataMap[item.w].a.push(...(item.a || []));
  }
});

// 🔥 重複削除（中身）
const mergedData = Object.values(mergedDataMap).map(item => ({
  w: item.w,
  m: item.m,
  s: [...new Set(item.s)],
  a: [...new Set(item.a)]
}));

// 🔥 以降はこれを使う


let current, mode, correctCount = 0;
let answered = false;

let answerCount = 1;

let wrongList = [];
let reviewMode = false;

function newRound(){
  answered = false;
  correctCount = 0;

  document.getElementById("result").innerText="";
  document.getElementById("jp").innerText="";

   let tries = 0;

  do{
    if(reviewMode && wrongList.length > 0){
      let filtered = mergedData.filter(d => wrongList.includes(d.w));
      current = filtered[Math.floor(Math.random()*filtered.length)];
    }else{
      current = mergedData[Math.floor(Math.random()*mergedData.length)];
    }

    mode = Math.random()>0.5 ? "s" : "a";
    tries++;

  }while(mode==="a" && current.a.length===0 && tries < 50);
  
  document.getElementById("target").innerText = current.w;
  document.getElementById("question").innerText =
    mode==="s" ? "類語を選べ" : "対義語を選べ";

  let correctList = mode==="s" ? current.s : current.a;
  correctList = [correctList[Math.floor(Math.random()*correctList.length)]];
  answerCount = correctList.length;
  let pool = [];

  correctList.forEach(w=>pool.push({word:w,correct:true}));

  let safety = 0;
  while(pool.length < 6 && safety < 50){
  safety++;

  let r = mergedData[Math.floor(Math.random()*mergedData.length)];
  let list = (r.s || []).concat(r.a || []);

  if(list.length === 0) continue;

  let fake = list[Math.floor(Math.random()*list.length)];

if(fake && !pool.some(p=>p.word===fake) && fake !== current.w){
  pool.push({word:fake, correct:false});
 }
}


pool.sort(()=>Math.random()-0.5);

document.getElementById("grid").innerHTML =
  pool.map(p=>`
    <div class="card" data-correct="${p.correct}" onclick="selectCard(this,${p.correct})">
      ${p.word}
    </div>
  `).join("");
}

function selectCard(el,isCorrect){

  if(answered) return;

  if(isCorrect){
    document.getElementById("correctSound").play();
    el.classList.add("correct");
    correctCount++;

    if(correctCount === answerCount){
  showAnswer(true);
}

  }else{
    document.getElementById("wrongSound").play();

    if(!wrongList.includes(current.w)){
      wrongList.push(current.w);
    }

    el.classList.add("wrong");
    showAnswer(false);
  }
} 

function showAnswer(ok){
  answered = true;

  // ★全部の正解を表示
  document.querySelectorAll(".card").forEach(card=>{
    if(card.dataset.correct === "true"){
      card.classList.add("correct");
    }
  });

  document.getElementById("jp").innerText =
  "意味：" + current.m +
  "\n正解：" + (mode==="s" ? current.s.join(", ") : current.a.join(", "));

  document.getElementById("result").innerText =
  ok ? "OK!" : "MISS（正解を確認しよう）";

  if(ok && reviewMode){
  wrongList = wrongList.filter(w => w !== current.w);
}

  setTimeout(newRound,3000);
}

function toggleReview(){
  reviewMode = !reviewMode;

  const btn = document.querySelectorAll("button")[1];

  if(reviewMode){
    btn.innerText = "復習モード ON";
  }else{
    btn.innerText = "復習モード OFF";
  }

  newRound();
}

function toggleBGM(){
  const bgm = document.getElementById("bgm");
  if(bgm.paused){
    bgm.play();
  }else{
    bgm.pause();
  }
}

newRound();
</script>
